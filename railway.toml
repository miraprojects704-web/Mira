# Railway configuration for the Mira Frontend

[build]
builder = "NIXPACKS"

[deploy]
# This command serves the static files generated by `npm run build`.
# Nginx is a robust choice for serving a production React app.
startCommand = "npm install -g serve && serve -s dist -l $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10