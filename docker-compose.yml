services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mira
      POSTGRES_USER: mira
      POSTGRES_PASSWORD: mira
    ports:
      - "5432:5432"
    volumes:
      - mira_postgres:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+psycopg://mira:mira@db:5432/mira
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mira_postgres:
